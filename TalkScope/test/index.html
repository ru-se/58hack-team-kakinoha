<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Transcript Focus Lab</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div class="bg-shape bg-shape-a"></div>
    <div class="bg-shape bg-shape-b"></div>

    <main class="container">
      <header class="hero">
        <p class="eyebrow">Frontend-only Prototype</p>
        <h1>Transcript Focus Lab</h1>
        <p class="subtitle">
          文字起こしから重要語を抽出し、重み付けして強調表示する試作アプリです。
        </p>
      </header>

      <section class="panel controls">
        <div class="control-row">
          <label for="langSelect">認識言語</label>
          <select id="langSelect">
            <option value="ja-JP">日本語 (ja-JP)</option>
            <option value="en-US">英語 (en-US)</option>
          </select>
        </div>
        <div class="control-row">
          <label for="keywordInput">分野キーワード (カンマ区切り可)</label>
          <input id="keywordInput" type="text" value="IT, クラウド, セキュリティ" />
        </div>
        <div class="control-row">
          <label for="tfidfToggle">TF-IDF を使う</label>
          <input id="tfidfToggle" type="checkbox" />
        </div>
        <div class="button-row">
          <button id="startBtn" class="btn btn-main">録音開始</button>
          <button id="stopBtn" class="btn" disabled>録音停止</button>
          <button id="analyzeBtn" class="btn btn-accent">テキスト解析</button>
          <button id="sampleBtn" class="btn">サンプル投入</button>
        </div>
        <p id="statusText" class="status">待機中</p>
      </section>

      <section class="panel">
        <label for="transcriptInput" class="area-label">文字起こし結果</label>
        <textarea
          id="transcriptInput"
          rows="7"
          placeholder="ここに文字起こしテキストが入ります。手入力でも解析できます。"
        ></textarea>
      </section>

      <section class="panel">
        <h2>強調表示（高スコアほど濃く表示）</h2>
        <div id="highlightView" class="highlight-view"></div>
      </section>

      <section class="panel">
        <h2>単語スコア内訳</h2>
        <div class="table-wrap">
          <table id="scoreTable">
            <thead>
              <tr>
                <th>単語</th>
                <th>総合</th>
                <th id="termWeightCol">TF</th>
                <th>文構造</th>
                <th>分野関連</th>
                <th>キーフレーズ</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/compromise@14.14.4/builds/compromise.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tiny-segmenter@0.2.0/tiny_segmenter.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.22.0/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/universal-sentence-encoder@1.3.3/dist/universal-sentence-encoder.min.js"></script>
    <script type="module" src="./app.js"></script>
  </body>
</html>
