services:
  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
    container_name: lexiflow-frontend
    ports:
      - "5173:5173"
    environment:
      - CHOKIDAR_USEPOLLING=true
    volumes:
      - ./Frontend:/app
      - frontend_node_modules:/app/node_modules

  backend:
    platform: ${BACKEND_PLATFORM:-linux/amd64}
    build:
      context: ./Backend
      dockerfile: Dockerfile
    container_name: lexiflow-backend
    ports:
      - "8000:8000"
    environment:
      - PYTHONDONTWRITEBYTECODE=1
      - PYTHONUNBUFFERED=1
    volumes:
      - ./Backend:/app

volumes:
  frontend_node_modules:
