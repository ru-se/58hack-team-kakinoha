<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chimera Portal</title>
    <link rel="stylesheet" href="./style.css">
</head>

<body>
    <div class="gradient-bg"></div>

    <main id="portal-view">
        <div class="title-container">
            <h1 class="title">Chimera OS</h1>
            <p class="subtitle">Unified Application Portal</p>
        </div>

        <!-- メニューカードがここに追加されます -->
        <div class="grid-container" id="app-grid"></div>
    </main>

    <!-- アプリをシームレスに表示するコンテナ -->
    <div id="app-view" class="hidden">
        <div class="app-header">
            <button id="back-button" class="back-btn">
                <span class="back-icon">←</span> メニューに戻る
            </button>
            <h2 id="current-app-title" class="app-title">App Name</h2>
        </div>
        <iframe id="app-frame" src="" frameborder="0"></iframe>
    </div>

    <script type="module" src="./script.js"></script>
</body>

</html>
