<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>C H I M E R A - P O R T A L</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=DotGothic16&family=Inter:wght@300;400;700&family=M+PLUS+Rounded+1c:wght@700;800&family=Share+Tech+Mono&family=Creepster&family=Rubik+Glitch&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="./style.css">
</head>

<body class="chimera-active">

    <!-- 有機的な歪みフィルター (SVG) -->
    <svg style="position: absolute; width: 0; height: 0;" aria-hidden="true" focusable="false">
        <filter id="organic-distortion">
            <feTurbulence type="fractalNoise" baseFrequency="0.01" numOctaves="3" seed="1" result="noise">
                <animate attributeName="baseFrequency" values="0.01;0.015;0.01" dur="10s" repeatCount="indefinite" />
            </feTurbulence>
            <feDisplacementMap in="SourceGraphic" in2="noise" scale="8" xChannelSelector="R" yChannelSelector="G" />
        </filter>

        <!-- 色収差フィルター -->
        <filter id="chromatic">
            <feOffset in="SourceGraphic" dx="-2" dy="0" result="red" />
            <feOffset in="SourceGraphic" dx="2" dy="0" result="blue" />
            <feComposite in="red" in2="blue" operator="xor" />
        </filter>
    </svg>

    <!-- 背景・演出用レイヤー（文字を歪ませないよう独立） -->
    <div id="marble-overlay"></div>
    <div id="digital-noise"></div>
    <div id="visceral-overlay"></div>
    <div id="whisper-bar"></div>
    <div id="static-flash"></div>

    <!-- 乱雑なワイヤー（つぎはぎ演出） -->
    <div class="wires-container">
        <div class="wire wire-1"></div>
        <div class="wire wire-2"></div>
        <div class="wire wire-3"></div>
    </div>

    <!-- 動的背景コンテナ -->
    <div id="dynamic-bg-container">
        <div class="dynamic-bg bg-talkscope"></div>
        <div class="dynamic-bg bg-realyou"></div>
        <div class="dynamic-bg bg-growtree"></div>
        <div class="dynamic-bg bg-timefaker"></div> <!-- settings -> timefaker -->
    </div>

    <!-- CRTスキャンラインとベース背景のオーバーレイ -->
    <div class="patchwork-bg"></div>
    <div class="scanlines"></div>

    <main id="portal-view">
        <!-- メニューカード (タイトル削除に伴い最上部から全画面展開) -->
        <div class="chaos-grid" id="app-grid"></div>
    </main>

    <div id="app-view" class="hidden">
        <div class="app-header">
            <button id="back-button" class="back-btn glitch-btn">
                <span class="back-icon">✕</span> EJECT TO TIMEFACKER
            </button>
            <div class="duct-tape tape-header"></div>
            <marquee id="current-app-title" class="app-title scroll-text" scrollamount="15">...</marquee>
        </div>
        <iframe id="app-frame" src="" frameborder="0"></iframe>
    </div>

    <!-- TimeFaker Alarm Modal -->
    <div id="timefaker-modal" class="tf-modal">
        <div class="tf-modal-overlay"></div>
        <div class="tf-modal-content">
            <div class="scanlines" style="z-index: 1; pointer-events: none;"></div>
            <div class="tf-modal-header glitch-text" data-text="TEMPORAL OVERRIDE">TEMPORAL OVERRIDE</div>
            <div class="tf-modal-body" style="z-index: 2;">
                <!-- NEW Quick Actions -->
                <div class="tf-quick-actions">
                    <button id="tf-btn-now" class="tf-quick-btn">SYNC<br>NOW</button>
                    <button id="tf-btn-24h" class="tf-quick-btn">FFWD<br>24H</button>
                    <button id="tf-btn-3d" class="tf-quick-btn">FFWD<br>3 DAYS</button>
                </div>

                <!-- NEW Date Section -->
                <div class="tf-date-group">
                    <button id="tf-date-prev" class="tf-arrow-btn">◄</button>
                    <input type="date" id="tf-date-input" class="tf-date-input">
                    <button id="tf-date-next" class="tf-arrow-btn">►</button>
                </div>

                <!-- UPDATED Time Section (Slot Machine Feel) -->
                <div class="tf-input-group">
                    <div class="tf-slot">
                        <button id="tf-hour-up" class="tf-slot-btn">▲</button>
                        <input type="number" id="tf-hours" class="tf-time-input" min="0" max="23" value="00">
                        <button id="tf-hour-down" class="tf-slot-btn">▼</button>
                    </div>
                    <span class="tf-colon">:</span>
                    <div class="tf-slot">
                        <button id="tf-minute-up" class="tf-slot-btn">▲</button>
                        <input type="number" id="tf-minutes" class="tf-time-input" min="0" max="59" value="00">
                        <button id="tf-minute-down" class="tf-slot-btn">▼</button>
                    </div>
                </div>

                <div class="tf-message" id="tf-status-msg">AWAITING INPUT...</div>
            </div>
            <div class="tf-modal-footer" style="z-index: 2;">
                <button id="tf-cancel-btn" class="tf-btn tf-btn-cancel">CANCEL</button>
                <button id="tf-set-btn" class="tf-btn tf-btn-set">SET ALARM</button>
            </div>
        </div>
    </div>

    <script type="module" src="./script.js"></script>
</body>

</html>
